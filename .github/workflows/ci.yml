name: ETL Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax (etl files)
        run: |
          python -m py_compile etl/extract.py
          python -m py_compile etl/transform.py
          python -m py_compile etl/load_postgres.py
          echo "All ETL files passed syntax check!"

      - name: Check Python syntax (airflow dag)
        run: |
          python -m py_compile airflow/dags/movies_pipeline.py
          echo "Airflow DAG passed syntax check!"

      - name: Validate dbt project structure
        run: |
          pip install dbt-postgres==1.7.0
          cd movies_dbt
          dbt debug --profiles-dir . --no-version-check 2>&1 | head -20 || true
          echo "dbt project structure validated!"