name: ETL Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 sqlalchemy==2.0.36 psycopg2-binary==2.9.11 python-dotenv==1.0.1 boto3==1.34.34 dbt-core==1.11.6 dbt-postgres==1.10.0

      - name: Check Python syntax (etl files)
        run: |
          python -m py_compile etl/extract.py
          python -m py_compile etl/transform.py
          python -m py_compile etl/load_postgres.py
          python -m py_compile etl/load_snowflake.py
          echo "All ETL files passed syntax check!"

      - name: Validate dbt project structure
        run: |
          cd movies_dbt
          dbt debug --profiles-dir . --no-version-check 2>&1 | head -20 || true
          echo "dbt project structure validated!"